worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # Upstream services
    # -------------------------------------------------------------------------
    upstream api_service {
        server api:3001;
    }

    upstream dashboard_service {
        server dashboard:3000;
    }

    # -------------------------------------------------------------------------
    # HTTP → HTTPS redirect
    # Comment out this block for local development (use server below on 80)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # For local development: comment out the return below and keep the proxy blocks
        # For production: keep the return to force HTTPS
        # return 301 https://$host$request_uri;

        # Local development proxy (comment out for production):
        location /api/ {
            proxy_pass http://api_service/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location / {
            proxy_pass http://dashboard_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 30s;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server (production)
    # Uncomment and configure for production with real SSL certs
